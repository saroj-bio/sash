<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Mobile Carousel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:Arial;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
}

.main{
    width:100%;
    max-width:1400px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:30px;
}

/* ================= CAROUSEL WRAP ================= */

.carousel-wrap{
    width:100%;
    display:flex;
    justify-content:center;
}

/* ================= CAROUSEL ================= */

.carousel {
    width:100%;

    /* 🔥 BIG MOBILE FIX */
    height: clamp(500px, 80vh, 900px);

    position:relative;
    perspective:900px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ================= CARD ================= */

.card {
    position:absolute;

    /* 🔥 MUCH BIGGER MOBILE CARDS */
    width: clamp(220px, 70vw, 340px);
    height: clamp(320px, 85vw, 520px);

    border-radius:18px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ================= TIMER (optional keep minimal) ================= */

.timer{
    display:none;
}

</style>
</head>

<body>

<div class="main">

    <div class="carousel-wrap">
        <div class="carousel" id="carousel"></div>
    </div>

</div>

<script>

const images = [
  "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800",
  "https://images.unsplash.com/photo-1511765224389-37f0e77cf0eb?w=800",
  "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800",
  "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800",
  "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800",
  "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=800",
];

const container = document.getElementById("carousel");

let index = 0;
const n = images.length;

/* ================= TOUCH ================= */

let startX = 0;

document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
    let diff = startX - e.changedTouches[0].clientX;
    if(Math.abs(diff) > 40){
        move(diff > 0 ? 1 : -1);
    }
});

/* ================= LAYOUT ================= */

function getLayout(){

    const isMobile = window.innerWidth < 768;

    const base = isMobile ? [
        { x:-220, z:-200, rotY:40, scale:0.7, blur:3, opacity:0.4 },
        { x:-120, z:-100, rotY:20, scale:0.85, blur:1, opacity:0.6 },
        { x:0,    z:0,    rotY:0,  scale:1.35, blur:0, opacity:1 },
        { x:120,  z:-100, rotY:-20,scale:0.85, blur:1, opacity:0.6 },
        { x:220,  z:-200, rotY:-40,scale:0.7, blur:3, opacity:0.4 },
    ] : [
        { x:-520, z:-500, rotY:55, scale:0.55, blur:5, opacity:0.3 },
        { x:-340, z:-300, rotY:30, scale:0.7,  blur:3, opacity:0.5 },
        { x:-160, z:-120, rotY:12, scale:0.9,  blur:1, opacity:0.8 },
        { x:0,    z:0,    rotY:0,  scale:1.25, blur:0, opacity:1 },
        { x:160,  z:-120, rotY:-12,scale:0.9,  blur:1, opacity:0.8 },
        { x:340,  z:-300, rotY:-30,scale:0.7,  blur:3, opacity:0.5 },
        { x:520,  z:-500, rotY:-55,scale:0.55, blur:5, opacity:0.3 },
    ];

    return base;
}

function norm(d){
    if(d > n/2) d -= n;
    if(d < -n/2) d += n;
    return d;
}

/* ================= BUILD ================= */

function build(){

    container.innerHTML = "";

    images.forEach((src,i)=>{
        const c = document.createElement("div");
        c.className = "card";
        c.innerHTML = `<img src="${src}">`;

        c.onclick = ()=> {
            index = i;
            update();
        };

        container.appendChild(c);
    });

    update();
}

/* ================= UPDATE ================= */

function update(){

    const layout = getLayout();

    document.querySelectorAll(".card").forEach((c,i)=>{

        let d = norm(i - index);

        const p = layout[d + Math.floor(layout.length/2)];

        if(!p) return;

        gsap.to(c,{
            x:p.x,
            z:p.z,
            rotateY:p.rotY,
            scale:p.scale,
            opacity:p.opacity,
            duration:0.9,
            ease:"power3.out"
        });

        gsap.to(c,{
            filter:`blur(${p.blur}px)`,
            duration:0.9
        });

        c.style.zIndex = 100 - Math.abs(d);
    });
}

/* ================= MOVE ================= */

function move(dir){
    index = (index + dir + n) % n;
    update();
}

/* ================= AUTO SWIPE ================= */

let firstDelay = true;

function autoSwipe(){

    setTimeout(()=>{

        move(1);

        // after first 10 sec → switch to 5 sec loop
        setInterval(()=>{
            move(1);
        }, 5000);

    }, 10000);
}

/* ================= INIT ================= */

build();
autoSwipe();

window.addEventListener("resize", update);

</script>

</body>
</html>
